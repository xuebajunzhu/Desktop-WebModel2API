name: coze
type: web
base_url: https://coze.com
login_detection: ".user-avatar"
input_selector: "textarea[placeholder*='message']"
send_button: "button[type='submit']"
response_container: ".conversation-item:last-child .assistant-message"
stream_detection: websocket
pre_actions:
  - clear_input
features:
  - text
  - multi_agent
  - bot_store
notes: |
  - Complex frontend with Bot switching logic
  - Target main chat input box for simplicity
  - ByteDance's Coze platform for multi-agent conversations
